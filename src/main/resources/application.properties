spring.application.name=backend
server.port=${PORT:8085}

# H2 In-Memory Database
spring.datasource.url=jdbc:h2:mem:logforxdb;DB_CLOSE_DELAY=-1
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA / Hibernate Setup
spring.jpa.show-sql=false
spring.jpa.hibernate.ddl-auto=update

# Disable open-in-view warning
spring.jpa.open-in-view=false

# Enable H2 Console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Increase Upload Limits for Forensics
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB

# Suppress Spring Security auto-generated password warning
logging.level.org.springframework.security=WARN
logging.level.org.springframework.boot.autoconfigure.security=ERROR
